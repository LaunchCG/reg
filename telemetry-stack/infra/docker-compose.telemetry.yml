# docker-compose.telemetry.yml
# Local telemetry infrastructure for development
# Distributed to .dex/stacks/telemetry-stack/ via the telemetry-stack package
# Start with: docker compose -f .dex/stacks/telemetry-stack/docker-compose.telemetry.yml up -d

version: "3.8"

networks:
  nexus-telemetry-network:
    name: nexus-telemetry-network
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
  loki-data:

services:

  # ── OpenTelemetry Collector ──────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: nexus-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./.dex/stacks/telemetry-stack/otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Collector self-metrics
      - "8889:8889"   # Prometheus exporter endpoint
    networks:
      - nexus-telemetry-network
    depends_on:
      elasticsearch:
        condition: service_healthy
      loki:
        condition: service_started

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: nexus-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./.dex/stacks/telemetry-stack/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - nexus-telemetry-network
    depends_on:
      - otel-collector

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.3
    container_name: nexus-grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "nexus-local"
      GF_SERVER_HTTP_PORT: "3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./.dex/stacks/telemetry-stack/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./.dex/stacks/telemetry-stack/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - nexus-telemetry-network
    depends_on:
      - prometheus
      - loki
      - elasticsearch

  # ── Loki ─────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.5
    container_name: nexus-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - nexus-telemetry-network

  # ── Elasticsearch ─────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: nexus-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      cluster.name: nexus-local
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - nexus-telemetry-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
