version: "1.0"

tasks:
  ts-test:
    description: "Run Jest tests"
    expose_working_directory: true
    command: "npx --no-install jest {{if .args}}{{.args}}{{end}}"
    type: oneshot
    parameters:
      args:
        type: string
        required: false
        description: "Additional arguments for Jest (e.g., --coverage, --watch, file paths)"

  ts-test-watch:
    description: "Run Jest in watch mode"
    expose_working_directory: true
    command: "npx --no-install jest --watch {{if .args}}{{.args}}{{end}}"
    type: oneshot
    disable_mcp: true
    parameters:
      args:
        type: string
        required: false
        description: "Additional arguments for Jest"

  ts-test-coverage:
    description: "Run Jest with coverage report"
    expose_working_directory: true
    command: "npx --no-install jest --coverage {{if .args}}{{.args}}{{end}}"
    type: oneshot
    disable_mcp: true
    parameters:
      args:
        type: string
        required: false
        description: "Additional arguments for Jest"

  ts-lint:
    description: "Run ESLint"
    expose_working_directory: true
    command: "npx --no-install eslint {{if .args}}{{.args}}{{else}}.{{end}}"
    type: oneshot
    parameters:
      args:
        type: string
        required: false
        description: "Additional arguments for ESLint (e.g., file paths, patterns)"

  ts-lint-fix:
    description: "Run ESLint with auto-fix"
    expose_working_directory: true
    command: "npx --no-install eslint --fix {{if .args}}{{.args}}{{else}}.{{end}}"
    type: oneshot
    parameters:
      args:
        type: string
        required: false
        description: "Additional arguments for ESLint"

  ts-type-check:
    description: "Run TypeScript type checking"
    expose_working_directory: true
    command: "npx --no-install tsc --noEmit {{if .args}}{{.args}}{{end}}"
    type: oneshot
    parameters:
      args:
        type: string
        required: false
        description: "Additional TypeScript compiler arguments"

workflows:
  ts-quality-check:
    description: "Run full TypeScript quality checks (lint, type-check, test)"
    steps:
      - task: ts-lint
      - task: ts-type-check
      - task: ts-test
