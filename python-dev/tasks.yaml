version: "1.0"

tasks:
  py-ruff:
    description: "Run Ruff linting and formatting checks"
    expose_working_directory: true
    command: "uvx ruff {{.args}}"
    type: oneshot
    parameters:
      args:
        type: string
        required: false
        description: "Arguments for ruff (e.g., 'check .', 'format --check .')"

  py-black:
    description: "Run Black code formatter"
    expose_working_directory: true
    command: "uvx black {{.args}}"
    type: oneshot
    parameters:
      args:
        type: string
        required: false
        description: "Arguments for black (e.g., '--check .', '.')"

  py-isort:
    description: "Run isort import formatter"
    expose_working_directory: true
    command: "uvx isort {{.args}}"
    type: oneshot
    parameters:
      args:
        type: string
        required: false
        description: "Arguments for isort (e.g., '--check-only .', '.')"

  py-mypy:
    description: "Run mypy type checking"
    expose_working_directory: true
    command: "uv run mypy {{.args}}"
    type: oneshot
    parameters:
      args:
        type: string
        required: false
        description: "Arguments for mypy (e.g., '--strict .', '.')"


prompts:
  py-fix-code-quality:
    description: "Guide for fixing Python code quality issues found by linters"
    content: |
      Analyze the linting output and fix all code quality issues:
      1. Run {{.Tasks.py-ruff.Run}} with args "check ." to identify ruff issues
      2. Run {{.Tasks.py-black.Run}} with args "--check ." to identify formatting issues
      3. Run {{.Tasks.py-isort.Run}} with args "--check-only ." to identify import issues
      4. Run {{.Tasks.py-mypy.Run}} with args "." to identify type errors
      5. Fix ruff violations first, then black, then isort, then mypy
      6. Re-run all checks to verify all issues are resolved.
