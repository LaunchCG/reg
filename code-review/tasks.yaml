version: "1.0"

tasks:
  cr-git-cmd:
    description: "Execute git command with custom arguments"
    expose_working_directory: true
    command: "git {{.args}}"
    type: oneshot
    parameters:
      args:
        type: string
        required: true
        description: "Git command and arguments (e.g., 'diff HEAD~1', 'show --stat', 'log --oneline -10')"

  cr-analyze-module-size:
    description: "Analyze module sizes across languages to identify large files"
    expose_working_directory: true
    command: |
      find . -type f \( \
        -name '*.py' -o \
        -name '*.js' -o \
        -name '*.ts' -o \
        -name '*.tsx' -o \
        -name '*.jsx' -o \
        -name '*.go' -o \
        -name '*.rs' -o \
        -name '*.java' -o \
        -name '*.rb' -o \
        -name '*.php' -o \
        -name '*.c' -o \
        -name '*.cpp' -o \
        -name '*.h' -o \
        -name '*.hpp' \
      \) -exec wc -l {} + | sort -rn | head -n {{.limit}}
    type: oneshot
    parameters:
      limit:
        type: string
        required: false
        description: "Number of largest files to display (default: 20)"
        default: "20"

  cr-detect-languages:
    description: "Detect programming languages used in the current project"
    expose_working_directory: true
    command: |
      echo "Analyzing project languages..." && \
      find . -type f -not -path '*/\.*' -not -path '*/node_modules/*' -not -path '*/vendor/*' | \
      sed -n 's/.*\.\([^.]*\)$/\1/p' | \
      sort | uniq -c | sort -rn | \
      awk '{
        ext=$2;
        count=$1;
        lang="Unknown";
        if (ext == "py") lang="Python";
        else if (ext == "js") lang="JavaScript";
        else if (ext == "ts") lang="TypeScript";
        else if (ext == "tsx" || ext == "jsx") lang="React";
        else if (ext == "go") lang="Go";
        else if (ext == "rs") lang="Rust";
        else if (ext == "java") lang="Java";
        else if (ext == "rb") lang="Ruby";
        else if (ext == "php") lang="PHP";
        else if (ext == "c" || ext == "h") lang="C";
        else if (ext == "cpp" || ext == "hpp" || ext == "cc") lang="C++";
        else if (ext == "sh") lang="Shell";
        else if (ext == "md") lang="Markdown";
        else if (ext == "json") lang="JSON";
        else if (ext == "yaml" || ext == "yml") lang="YAML";
        else if (ext == "html") lang="HTML";
        else if (ext == "css") lang="CSS";
        else if (ext == "sql") lang="SQL";
        printf "%-15s %5d files\n", lang, count;
      }'
    type: oneshot

prompts:
  cr-start-review:
    description: "Kick off a comprehensive code review using the code-review and software-engineering skills"
    content: |
      You are performing a comprehensive code review. Activate your **code-review** and **software-engineering** skills now — they contain your review methodology, severity classification, universal review dimensions, and output format.

      ## Step 1: Gather Context

      Run these now to understand the change:

      1. {{.Tasks.cr-git-cmd.Run}} with args `diff main...HEAD` — see all changed lines
      2. {{.Tasks.cr-git-cmd.Run}} with args `log main...HEAD --oneline` — understand commit intent
      3. {{.Tasks.cr-git-cmd.Run}} with args `diff --stat main...HEAD` — get files changed summary
      4. {{.Tasks.cr-detect-languages.Run}} — identify languages in scope

      ## Step 2: Size Assessment

      Count lines changed from the diff stat output:
      - <100 lines → Standard review
      - 100–500 lines → Thorough review
      - 500–1000 lines → Extra scrutiny
      - >1000 lines → Consider requesting a split

      ## Step 3: Execute the Review

      Follow all 6 phases from your **code-review** skill:
      1. **Context Gathering** — change type, goals, linked issues
      2. **Language Detection** — map languages to language-specific skills
      3. **Universal Review** — all 6 dimensions (quality, architecture, module organization, testing, security, performance)
      4. **Language-Specific Analysis** — invoke language skills (python-style, typescript, etc.) for each language detected
      5. **Severity Classification** — apply [CRITICAL] / [ERROR] / [WARNING] / [SUGGESTION] per your skill
      6. **Report Generation** — use the output format template from your skill

      If large files are flagged, run {{.Tasks.cr-analyze-module-size.Run}} to identify oversized modules.

      ## Step 4: Produce the Report

      Output the full Code Review Report using the template in your **code-review** skill. Include:
      - Summary with file count, line count, change type, and overall assessment
      - All issues grouped by severity with file:line references and concrete fixes
      - Test coverage assessment
      - Clear approval status: **APPROVED** / **APPROVED WITH COMMENTS** / **CHANGES REQUESTED**
